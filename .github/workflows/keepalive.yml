name: Keepalive
on:
  schedule:
    - cron: '0 0 1 * *' # every month on the 1st at 00:00 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update keepalive timestamp
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --staged --quiet || git commit -m "chore: keepalive [skip ci]"
          git push
